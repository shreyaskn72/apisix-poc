apisix:
  node_listen: 9080

routes:
  - uri: /trigger/*
    methods:
      - POST

    plugins:
      key-auth: {}

      proxy-rewrite:
        headers:
          set:
            X-Client-Id: clientA
            X-Org-Id: orgA

    upstream:
      type: roundrobin
      nodes:
        "fastapi-wrapper:8000": 1

consumers:
  - username: clientA
    plugins:
      key-auth:
        key: clientA-secret-key